apiVersion: apps/v1
kind: Deployment
metadata:
  name: neil-portfolio-web
  namespace: neil-portfolio
  labels:
    app: neil-portfolio-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neil-portfolio-web
  template:
    metadata:
      labels:
        app: neil-portfolio-web
    spec:
      containers:
        - name: web
          image: ghcr.io/neil795/neil-sinha-it-portfolio:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
